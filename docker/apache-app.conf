# --- Compression ---
<IfModule mod_brotli.c>
    AddOutputFilterByType BROTLI_COMPRESS text/html text/css text/plain application/javascript application/json image/svg+xml
</IfModule>
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/css text/plain application/javascript application/json image/svg+xml
</IfModule>

# --- Caching ---
<IfModule mod_expires.c>
    ExpiresActive On
</IfModule>

# Hashed Vite output → immutable, cache forever
<Directory /var/www/html/dist>
    <FilesMatch "\.(js|css|woff2?)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
</Directory>

# Static images (unhashed source paths) → 1 week
<Directory /var/www/html/public>
    <FilesMatch "\.(png|jpe?g|gif|webp|avif|svg|ico)$">
        Header set Cache-Control "public, max-age=604800"
    </FilesMatch>
</Directory>

# HTML/PHP must revalidate (embeds hashed asset paths from manifest)
<FilesMatch "\.(html|php)$">
    Header set Cache-Control "no-cache, must-revalidate"
</FilesMatch>
